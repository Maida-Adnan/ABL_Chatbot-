version: "3.8"

services:
  # Service 1: Your FastAPI application
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  # Service 2: The Ollama Runtime
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Automatically pulls your exact models so the other person doesn't have to
    entrypoint: [
      "/bin/bash", "-c",
      "ollama serve & sleep 5 && ollama pull deepseek-r1:1.5b && ollama pull nomic-embed-text && wait"
    ]

volumes:
  chroma_data:
  ollama_data: