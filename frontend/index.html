<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABL Chatbot — Allied Bank Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      background: #1B3A6B;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-logo {
      width: 36px;
      height: 36px;
      background: #FF6B00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 16px;
    }
    .header-text h1 { color: white; font-size: 16px; font-weight: 700; }
    .header-text p { color: #a0b4d0; font-size: 11px; margin-top: 1px; }
    .header-badge {
      margin-left: auto;
      background: #FF6B00;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 64px;
      padding-bottom: 80px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .welcome { text-align: center; padding: 40px 20px; }
    .welcome h2 { color: #1B3A6B; font-size: 20px; margin-bottom: 8px; }
    .welcome p { font-size: 13px; color: #888; line-height: 1.6; }
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .chip {
      background: white;
      border: 1px solid #dce3ef;
      color: #1B3A6B;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { background: #1B3A6B; color: white; border-color: #1B3A6B; }
    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.bot .avatar { background: #1B3A6B; color: white; }
    .message.user .avatar { background: #FF6B00; color: white; }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.bot .bubble {
      background: white;
      color: #1a1a1a;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .message.user .bubble {
      background: #1B3A6B;
      color: white;
      border-top-right-radius: 4px;
    }
    .thinking .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #888;
      font-style: italic;
      font-size: 13px;
    }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 6px;
      height: 6px;
      background: #FF6B00;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e0e6f0;
      padding: 12px 16px;
      display: flex;
      justify-content: center;
    }
    .input-inner {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1.5px solid #dce3ef;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #1B3A6B; }
    textarea::placeholder { color: #aab; }
    button#send {
      background: #FF6B00;
      color: white;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    button#send:hover { background: #e55f00; }
    button#send:disabled { background: #ccc; cursor: not-allowed; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #dce3ef; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">A</div>
    <div class="header-text">
      <h1>ABL Chatbot</h1>
      <p>Allied Bank Digital Assistant</p>
    </div>
    <div class="header-badge">ONLINE</div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Hi, I'm ABL Chatbot </h2>
        <p>I can help you with Allied Bank's products, accounts,<br/>cards, digital banking, and more.</p>
        <div class="welcome-chips">
          <div class="chip" onclick="sendChip(this)">How do I activate my Asaan Mobile Account?</div>
          <div class="chip" onclick="sendChip(this)">How do I generate a T-Pin?</div>
          <div class="chip" onclick="sendChip(this)">How do I block my debit card?</div>
          <div class="chip" onclick="sendChip(this)">Tell me about Allied Home Finance</div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <textarea
        id="input"
        placeholder="Ask me about Allied Bank products or services..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send" onclick="sendMessage()">&#9658;</button>
    </div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/chat";
    let sessionId = "";

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendChip(el) {
      document.getElementById("input").value = el.textContent;
      sendMessage();
    }

    function addMessage(text, role) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message " + role;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "bot" ? "A" : "U";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.style.whiteSpace = "pre-wrap";
      const cleaned = text.replace(/^\s+/, '');
      bubble.innerHTML = cleaned
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
      div.appendChild(avatar);
      div.appendChild(bubble);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addThinking() {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message bot thinking";
      div.id = "thinking";
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "A";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.style.background = "white";
      bubble.style.color = "#a888";
      bubble.style.boxShadow = "0 1px 4px rgba(0,0,0,0.08)";
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div> Thinking...';
      div.appendChild(avatar);
      div.appendChild(bubble);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeThinking() {
      const t = document.getElementById("thinking");
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const question = input.value.trim();
      if (!question) return;
      const welcome = document.querySelector(".welcome");
      if (welcome) welcome.remove();
      addMessage(question, "user");
      input.value = "";
      input.style.height = "auto";
      document.getElementById("send").disabled = true;
      addThinking();
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, session_id: sessionId })  // 1. SHIPPING IT OUT to the chat router then it will go to rag pipleline from the router 
        });
        const data = await response.json();    // 2. RECEIVING THE PACKET  // <--- THIS line converts the JSON text (which was received to us from the chat router as FASTapi converted the python object into json text) into a JS Object
        removeThinking();
        if (response.ok) {
          sessionId = data.session_id;    // 3. RETRIEVING & OVERWRITING IT
          addMessage(data.answer, "bot");// 4. SHOWING THE TEXT

        } else {
          addMessage("Something went wrong. Please try again.", "bot");
        }
      } catch (err) {
        removeThinking();
        addMessage("Could not reach the server. Make sure the API is running at " + API_URL, "bot");
      } finally {
        document.getElementById("send").disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
